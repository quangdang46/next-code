name: NextCodeMobile
options:
  bundleIdPrefix: com.next-code
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  NextCodeKit:
    path: .

targets:
  NextCodeMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources/NextCodeMobile
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Sources/NextCodeMobile/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: @@COM_NEXT_CODE_MOBILE@@
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TAS6ARKDN7
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: NextCodeKit
        product: NextCodeKit
