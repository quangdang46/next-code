[package]
name = "next-code-provider-cursor-runtime"
version = "0.1.0"
edition = "2024"
description = "Cursor provider runtime (direct ChatService streaming) for next-code, kept downstream of next-code-base so provider edits do not rebuild the app spine"

[lib]
name = "next_code_provider_cursor_runtime"
path = "src/lib.rs"

[dependencies]
next-code-core = { path = "../next-code-core" }
anyhow = "1"
async-trait = "0.1"
bytes = "1"
chrono = { version = "0.4", features = ["serde"] }
flate2 = "1"
h2 = "0.4"
http = "1"
# default-features = false: the top-level binary decides heavy optional base
# features (embeddings/bedrock). Runtime crates must not re-enable them via
# feature unification, or --no-default-features release targets (e.g. Windows
# ARM64, which cannot build tract-linalg asm) break.
next-code-base = { path = "../next-code-base", default-features = false }
next-code-message-types = { path = "../next-code-message-types" }
next-code-provider-core = { path = "../next-code-provider-core" }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "charset", "http2", "system-proxy", "rustls-tls", "rustls-tls-native-roots"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "time", "rt", "process", "io-util", "net"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12"] }
tokio-stream = "0.1"
uuid = { version = "1", features = ["v4", "v5"] }
webpki-roots = "1"

[dev-dependencies]
# The migrated cursor tests use next-code-base's test-env sandbox (lock_test_env).
next-code-base = { path = "../next-code-base", features = ["test-support"] }
tempfile = "3"
