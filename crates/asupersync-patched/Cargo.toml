[lints.clippy.nursery]
level = "warn"
priority = -1

[lints.clippy.pedantic]
level = "warn"
priority = -1

[lints.rust]
missing_docs = "allow"
unsafe_code = "deny"
unused_doc_comments = "allow"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(loom)",
    "cfg(fuzzing)",
    'cfg(feature, values("quic", "http3", "wasm-browser-preview", "simd-intrinsics", "messaging-fabric", "obligation-cleanup-e2e"))',
]

[lints.rust.unused]
level = "warn"
priority = -1

[profile.bench]
opt-level = 3
lto = "fat"
codegen-units = 1

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"

[profile.release-perf]
opt-level = 3
lto = "thin"
debug = "line-tables-only"
inherits = "release"
strip = false
