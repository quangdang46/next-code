[package]
name = "next-code-provider-anthropic-runtime"
version = "0.1.0"
edition = "2024"
description = "Direct Anthropic Messages API provider runtime (OAuth + API key, SSE streaming) for next-code, kept downstream of next-code-base so provider edits do not rebuild the app spine"

[lib]
name = "next_code_provider_anthropic_runtime"
path = "src/lib.rs"

[dependencies]
next-code-core = { path = "../next-code-core" }
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
next-code-base = { path = "../next-code-base" }
next-code-message-types = { path = "../next-code-message-types" }
next-code-provider-anthropic = { path = "../next-code-provider-anthropic" }
next-code-provider-core = { path = "../next-code-provider-core" }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "charset", "http2", "system-proxy", "rustls-tls", "rustls-tls-native-roots"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "time", "rt"] }
tokio-stream = "0.1"
uuid = { version = "1", features = ["v4", "v5"] }

[dev-dependencies]
# The migrated anthropic tests use next-code-base's test-env sandbox.
next-code-base = { path = "../next-code-base", features = ["test-support"] }
tempfile = "3"
