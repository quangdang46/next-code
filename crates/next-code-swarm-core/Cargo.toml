[package]
name = "next-code-swarm-core"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
next-code-plan = { path = "../next-code-plan" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
thiserror = "1"
regex = "1"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
