[package]
name = "next-code-tui"
version = "0.1.0"
edition = "2024"
publish = false

# Presentation layer for next-code: the terminal UI (`tui`) and the offline replay
# `video_export`, extracted out of the monolithic root `next-code` crate so they
# compile as a separate rustc unit. This crate builds on top of the application
# core (`next-code-app-core`) and re-exports it via `pub use next_code_app_core::*`, so
# every existing `crate::<module>` path (e.g. `crate::config`, `crate::server`)
# keeps resolving unchanged across the tui code that was moved here. The root
# `next-code` crate (cli + bin) in turn re-exports this crate via
# `pub use next_code_tui::*`.

[lib]
name = "next_code_tui"
path = "src/lib.rs"

[dependencies]
# Application core (server, agent, provider, auth, session, tool, config, ...).
# Re-exported via `pub use next_code_app_core::*` in lib.rs. default-features=false
# so this crate (and ultimately the root crate) controls app-core's features.
next-code-config-types = { path = "../next-code-config-types" }
next-code-app-core = { path = "../next-code-app-core", default-features = false }
next-code-agent-runtime = { path = "../next-code-agent-runtime" }
next-code-keywords = { path = "../next-code-keywords" }
basic-toml = "0.1"
next-code-memory-types = { path = "../next-code-memory-types" }

# Pure math kernels for the idle animations (3D samplers, glyph chooser,
# HSV->RGB). Pinned to opt-level = 3 in all profiles via workspace Cargo.toml so
# the hot trig loops stay optimized even in debug/selfdev builds.
next-code-tui-anim = { path = "../next-code-tui-anim" }

# Async runtime
tokio = { version = "1", features = ["fs", "io-std", "io-util", "macros", "net", "process", "rt-multi-thread", "signal", "sync", "time"] }
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["raw_value"] }

# Utilities
anyhow = "1"
libc = "0.2"
chrono = { version = "0.4", features = ["serde"] }
regex = "1"
dirs = "5"
similar = "2"
tempfile = "3"
open = "5"

# OAuth / hashing helpers used by the login + account UI
base64 = "0.22"
sha2 = "0.10"
rand = "0.9.3"
hex = "0.4"
url = "2"
urlencoding = "2"

# TUI
ratatui = "0.30"
crossterm = { version = "0.29", features = ["event-stream"] }
arboard = "3"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
unicode-width = "0.2"

# Presentation-layer workspace crates
next-code-build-meta = { path = "../next-code-build-meta" }
next-code-logging = { path = "../next-code-logging" }
next-code-core = { path = "../next-code-core" }
next-code-protocol = { path = "../next-code-protocol" }
next-code-fuzzy = { path = "../next-code-fuzzy" }
next-code-selfdev-types = { path = "../next-code-selfdev-types" }
next-code-session-types = { path = "../next-code-session-types" }
next-code-provider-core = { path = "../next-code-provider-core" }
next-code-provider-service = { path = "../next-code-provider-service" }
next-code-tui-markdown = { path = "../next-code-tui-markdown" }
next-code-tui-messages = { path = "../next-code-tui-messages" }
next-code-tui-core = { path = "../next-code-tui-core" }
next-code-tui-mermaid = { path = "../next-code-tui-mermaid" }
next-code-tui-account-picker = { path = "../next-code-tui-account-picker" }
next-code-tui-render = { path = "../next-code-tui-render" }
next-code-tui-visual-debug = { path = "../next-code-tui-visual-debug" }
next-code-tui-session-picker = { path = "../next-code-tui-session-picker", features = ["serde"] }
next-code-tui-style = { path = "../next-code-tui-style" }
terminal-colorsaurus = "1.0"
next-code-tui-permissions = { path = "../next-code-tui-permissions" }
next-code-tui-tool-display = { path = "../next-code-tui-tool-display" }
next-code-redact = { path = "../next-code-redact" }
next-code-tui-usage-overlay = { path = "../next-code-tui-usage-overlay" }
next-code-terminal-image = { path = "../next-code-terminal-image" }
next-code-productivity-core = { path = "../next-code-productivity-core" }
next-code-tui-workspace = { path = "../next-code-tui-workspace" }
ffs-search = { workspace = true }
ffs-engine = { workspace = true }

[features]
default = ["pdf", "embeddings"]
# Exposes bench-only debug helpers (e.g. debug_copy_selection_text_for_bench)
# consumed by the dev `tui_bench` binary in the root crate.
dev-bins = []
# Forwarded to app-core (and onward to next-code-base) so the root crate's feature
# set fully controls the optional stacks.
jemalloc = ["next-code-app-core/jemalloc"]
jemalloc-prof = ["next-code-app-core/jemalloc-prof"]
embeddings = ["next-code-app-core/embeddings"]
pdf = ["next-code-app-core/pdf"]
dcp = ["next-code-app-core/dcp"]
rtco = ["next-code-app-core/rtco"]
mmdr-size-api = ["next-code-tui-mermaid/mmdr-size-api"]
# Forwards the application core's `test-support` feature (and onward to
# next-code-base) so downstream crates' test targets can reach the whole stack's
# test helpers. Never enabled in normal (non-test) builds.
test-support = ["next-code-app-core/test-support"]

[dev-dependencies]
# Enables the downstream test-support helpers for *this* crate's own test
# target. Feature unification applies this only to test/bench/example builds.
next-code-app-core = { path = "../next-code-app-core", features = ["test-support"] }

[target.'cfg(target_os = "macos")'.dependencies]
global-hotkey = "0.7"
