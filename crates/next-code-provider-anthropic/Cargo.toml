[package]
name = "next-code-provider-anthropic"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
async-trait = "0.1"
futures = "0.3"
next-code-llm-core = { version = "0.1.0", path = "../next-code-llm-core" }
next-code-llm-protocols = { path = "../next-code-llm-protocols" }
next-code-logging = { path = "../next-code-logging" }
next-code-message-types = { path = "../next-code-message-types" }
next-code-provider-core = { path = "../next-code-provider-core" }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
