[package]
name = "xai-grok-shell"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Compile-stub facade of xai-org/grok-build xai-grok-shell (PR5)"

[dependencies]
agent-client-protocol = { version = "0.10.4", features = ["unstable"] }
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["sync", "macros", "rt"] }
tokio-util = { version = "0.7", default-features = true }
toml = "0.8"
xai-file-utils = { path = "../xai-file-utils" }
xai-grok-agent = { path = "../xai-grok-agent" }
xai-grok-config = { path = "../xai-grok-config" }
xai-grok-shared = { path = "../xai-grok-shared" }
xai-grok-telemetry = { path = "../xai-grok-telemetry" }
xai-grok-tools = { path = "../xai-grok-tools" }
xai-grok-workspace = { path = "../xai-grok-workspace" }
xai-grok-announcements = { path = "../xai-grok-announcements" }
