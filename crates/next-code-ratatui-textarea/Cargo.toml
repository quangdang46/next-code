[package]
name = "next-code-ratatui-textarea"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[dependencies]
crossterm = { version = "0.28", features = ["event-stream"] }
ratatui = { version = "0.28", features = ["crossterm", "unstable-widget-ref"] }
textwrap = "0.16"
tracing = { version = "0.1", optional = true }
unicode-segmentation = "1.12"
unicode-width = "0.2"
