[package]
name = "next-code-ratatui-textarea"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[dependencies]
crossterm = { version = "0.29", features = ["event-stream", "bracketed-paste"] }
ratatui = { version = "0.30", features = ["crossterm", "unstable-widget-ref"] }
ratatui-core = "0.1"
textwrap = "0.16"
tui-scrollbar = "0.2"
unicode-segmentation = "1.12"
unicode-width = "0.2"
