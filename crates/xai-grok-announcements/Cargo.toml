[package]
name = "xai-grok-announcements"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Vendored from xai-org/grok-build xai-grok-announcements — shared announcement types/persistence (PR6)"

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs"] }
tracing = "0.1"
xai-grok-config = { path = "../xai-grok-config" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
