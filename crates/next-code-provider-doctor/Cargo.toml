[package]
name = "next-code-provider-doctor"
version = "0.1.0"
edition = "2024"
publish = false

# Provider diagnostics that sit downstream of next-code-base: the strict
# `next-code provider-doctor` end-to-end runner (provider_e2e), the live provider
# probes it drives, and the auth-lifecycle contract driver. Split out of
# next-code-base so edits to the doctor cluster no longer rebuild the
# base -> app-core -> tui spine, and base compiles faster with lower peak
# memory.

[lib]
name = "next_code_provider_doctor"
path = "src/lib.rs"

[dependencies]
next-code-core = { path = "../next-code-core" }
anyhow = "1"
futures = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["time"] }

# default-features = false: the doctor only needs base's always-on surface
# (auth, provider runtimes, provider_catalog, live_tests). Feature unification
# in the root binary re-enables embeddings/bedrock there.
next-code-base = { path = "../next-code-base", default-features = false }
next-code-provider-gemini-runtime = { path = "../next-code-provider-gemini-runtime" }
next-code-provider-anthropic-runtime = { path = "../next-code-provider-anthropic-runtime" }
next-code-provider-openai-runtime = { path = "../next-code-provider-openai-runtime" }
next-code-provider-openrouter-runtime = { path = "../next-code-provider-openrouter-runtime" }
next-code-provider-cursor-runtime = { path = "../next-code-provider-cursor-runtime" }
next-code-provider-antigravity-runtime = { path = "../next-code-provider-antigravity-runtime" }
next-code-provider-copilot-runtime = { path = "../next-code-provider-copilot-runtime" }

[dev-dependencies]
# The auth-lifecycle driver tests run inside next-code-base's auth test sandbox.
next-code-base = { path = "../next-code-base", features = ["test-support"] }
next-code-provider-metadata = { path = "../next-code-provider-metadata" }
tokio = { version = "1", features = ["macros", "rt"] }
