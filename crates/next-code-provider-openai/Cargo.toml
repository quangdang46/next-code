[package]
name = "next-code-provider-openai"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
anyhow = "1"
base64 = "0.22"
bytes = "1"
futures = "0.3"
next-code-core = { path = "../next-code-core" }
next-code-llm-core = { path = "../next-code-llm-core" }
next-code-llm-protocols = { path = "../next-code-llm-protocols" }
next-code-logging = { path = "../next-code-logging" }
next-code-message-types = { path = "../next-code-message-types" }
next-code-provider-core = { path = "../next-code-provider-core" }
reqwest = { version = "0.12", default-features = false, features = ["stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
