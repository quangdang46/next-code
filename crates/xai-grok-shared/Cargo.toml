[package]
name = "xai-grok-shared"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Slim shared Face utilities vendored/adapted from xai-org/grok-build (PR2)"

[dependencies]
agent-client-protocol = { version = "0.10.4", features = ["unstable"] }
anyhow = "1"
base64 = "0.22"
dirs = "6"
dunce = "1"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp"] }
parking_lot = "0.12"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
thiserror = "2"
tracing = "0.1"
urlencoding = "2.1"
xai-grok-tools = { path = "../xai-grok-tools" }
xai-tty-utils = { path = "../xai-tty-utils" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6.3"

[target.'cfg(not(target_os = "macos"))'.dependencies]
arboard = { version = "3", features = ["wayland-data-control"] }

[target.'cfg(target_os = "linux")'.dependencies]
wl-clipboard-rs = "0.9"
