[package]
name = "next-code-provider-copilot-runtime"
version = "0.1.0"
edition = "2024"
description = "GitHub Copilot provider runtime (direct API, tier detection, premium modes) for next-code, kept downstream of next-code-base so provider edits do not rebuild the app spine"

[lib]
name = "next_code_provider_copilot_runtime"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
next-code-base = { path = "../next-code-base" }
next-code-message-types = { path = "../next-code-message-types" }
next-code-provider-copilot = { path = "../next-code-provider-copilot" }
next-code-provider-core = { path = "../next-code-provider-core" }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "charset", "http2", "system-proxy", "rustls-tls", "rustls-tls-native-roots"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
dirs = "5"
hex = "0.4"
futures = "0.3"
tokio = { version = "1", features = ["sync", "time", "rt"] }
tokio-stream = "0.1"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
# The migrated copilot tests use next-code-base's test-env sandbox.
next-code-base = { path = "../next-code-base", features = ["test-support"] }
tempfile = "3"
