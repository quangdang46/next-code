[package]
name = "xai-grok-mermaid"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Vendored from xai-org/grok-build xai-grok-mermaid — Mermaid → SVG → PNG (PureRustEngine)"

[dependencies]
# SVG -> PNG rasterization. `resvg` re-exports the matching `usvg` (0.47) and
# `tiny_skia`; we deliberately use `resvg::usvg` rather than a mismatched usvg
# so `resvg::render` typechecks against the tree we parse.
resvg = { version = "0.47", default-features = false, features = ["text"] }
tiny-skia = "0.12"
fontdb = "0.23"
thiserror = "1"
tracing = "0.1"
which = "7"
# Subprocess infra (MmdcEngine + the out-of-process render child): detached
# spawning + wall-clock timeout + process-group reaping.
xai-tty-utils = { path = "../xai-tty-utils" }
wait-timeout = "0.2"
tempfile = "3"
# Vendored dagre-based Mermaid -> SVG engine (third_party/mermaid-to-svg, MIT).
mermaid-to-svg = { path = "../../third_party/mermaid-to-svg" }

# Subprocess process-group reaping (killpg) for the sync subprocess path, since
# xai-tty-utils' ProcessGroup only wraps tokio children.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
# Decode output PNG and assert dimensions in tests.
image = { version = "0.25", default-features = false, features = ["png"] }
