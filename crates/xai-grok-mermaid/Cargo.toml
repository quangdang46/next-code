[package]
name = "xai-grok-mermaid"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Mermaid → PNG for Face via MmdrEngine (mermaid-rs-renderer)"

[dependencies]
# SVG -> PNG rasterization for MmdcEngine.
# `resvg` re-exports the matching `usvg` (0.47) and `tiny_skia`.
resvg = { version = "0.47", default-features = false, features = ["text"] }
tiny-skia = "0.12"
fontdb = "0.23"
thiserror = "1"
tracing = "0.1"
which = "7"
# Subprocess infra (MmdcEngine + the out-of-process render child): detached
# spawning + wall-clock timeout + process-group reaping.
xai-tty-utils = { path = "../xai-tty-utils" }
wait-timeout = "0.2"
tempfile = "3"
# Default Face engine: quangdang46/mermaid-rs-renderer @ Face PNG API (0.3.2+).
# Pin style matches next-code-tui-mermaid (git + rev/tag); rev has render_png_bytes.
mermaid-rs-renderer = { git = "https://github.com/quangdang46/mermaid-rs-renderer.git", rev = "baad3f0695ca2a3a5cf613ff723576ea55fd8ec7", default-features = false, features = ["png"] }

# Subprocess process-group reaping (killpg) for the sync subprocess path, since
# xai-tty-utils' ProcessGroup only wraps tokio children.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
# Decode output PNG and assert dimensions in tests.
image = { version = "0.25", default-features = false, features = ["png"] }
