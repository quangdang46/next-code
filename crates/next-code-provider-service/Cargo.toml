[package]
name = "next-code-provider-service"
version = "0.1.0"
edition = "2024"
description = "Catalog / Integration / Credential service traits and shared types for next-code provider resolution"

[lib]
name = "next_code_provider_service"
path = "src/lib.rs"

[[bin]]
name = "modelpicker"
path = "src/bin/modelpicker.rs"

[[bin]]
name = "providerctl"
path = "src/bin/providerctl.rs"

[features]
default = []
metadata = ["dep:next-code-provider-metadata"]
inventory = ["dep:inventory"]

[dependencies]
next-code-core = { path = "../next-code-core" }
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"], optional = true }
next-code-llm-core = { path = "../next-code-llm-core" }
next-code-llm-protocols = { path = "../next-code-llm-protocols" }
next-code-message-types = { path = "../next-code-message-types" }
next-code-provider-core = { path = "../next-code-provider-core" }
next-code-provider-metadata = { path = "../next-code-provider-metadata", optional = true }
inventory = { version = "0.3", optional = true }
next-code-keyring-store = { path = "../next-code-keyring-store" }
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
thiserror = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1", features = ["rt", "sync", "macros"] }
tracing = "0.1"
crossterm = "0.28"
ratatui = "0.28"
