[package]
name = "xai-file-utils"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Facade of xai-org/grok-build xai-file-utils — only workspace_classifier/gcs/trace_context surfaces the pager uses (PR6)"

[dependencies]
anyhow = "1"
dirs = "6"
serde_json = "1"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
