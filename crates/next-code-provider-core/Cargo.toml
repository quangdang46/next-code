[package]
name = "next-code-provider-core"
version = "0.1.0"
edition = "2024"

[lib]
name = "next_code_provider_core"
path = "src/lib.rs"

[dependencies]
next-code-core = { path = "../next-code-core" }
anyhow = "1"
async-trait = "0.1"
futures = "0.3"
httpdate = "1"
next-code-logging = { path = "../next-code-logging" }
next-code-message-types = { path = "../next-code-message-types" }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "charset", "http2", "system-proxy", "rustls-tls", "rustls-tls-native-roots"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.9.3"
sha2 = "0.10"
tokio = { version = "1", features = ["sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["sync", "macros", "rt"] }
