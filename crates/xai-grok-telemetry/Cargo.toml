[package]
name = "xai-grok-telemetry"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Shim: no-op telemetry for pager-render (Grok UI migration PR2/PR7)"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["registry", "std"] }
