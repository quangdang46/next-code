[package]
name = "next-code-provider-openai-runtime"
version = "0.1.0"
edition = "2024"
description = "OpenAI provider runtime (Codex OAuth + API key, Responses API over SSE/WebSocket) for jcode, kept downstream of next-code-base so provider edits do not rebuild the app spine"

[lib]
name = "next_code_provider_openai_runtime"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
next-code-base = { path = "../next-code-base" }
next-code-message-types = { path = "../next-code-message-types" }
next-code-provider-core = { path = "../next-code-provider-core" }
next-code-provider-openai = { path = "../next-code-provider-openai" }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "charset", "http2", "system-proxy", "rustls-tls", "rustls-tls-native-roots"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["raw_value"] }
tokio = { version = "1", features = ["sync", "time", "rt", "net", "io-util"] }
tokio-stream = "0.1"
tokio-tungstenite = { version = "0.24", default-features = false, features = ["connect", "rustls-tls-native-roots"] }
uuid = { version = "1", features = ["v4"] }
dirs = "5"

[dev-dependencies]
# The migrated openai tests use next-code-base's test-env sandbox.
next-code-base = { path = "../next-code-base", features = ["test-support"] }
tempfile = "3"
