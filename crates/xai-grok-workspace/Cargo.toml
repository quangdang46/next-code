[package]
name = "xai-grok-workspace"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Shim: workspace permission/trust/fs stubs for Grok Face pager (PR4)"

[dependencies]
agent-client-protocol = { version = "0.10.4", features = ["unstable"] }
dirs = "5"
dunce = "1"
# Face `@` file pickup — same ffs FilePicker stack as next-code TUI AtPicker.
ffs-search = { workspace = true }
fs2 = "0.4"
nucleo = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
toml = "0.8"
xai-grok-config = { path = "../xai-grok-config" }
xai-grok-version = { path = "../xai-grok-version" }

[dev-dependencies]
tempfile = "3"