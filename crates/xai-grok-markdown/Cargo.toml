[package]
name = "xai-grok-markdown"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
authors = ["xAI", "next-code contributors"]
description = "Vendored from xai-org/grok-build — streaming markdown for TUI (Apache-2.0)"

[dependencies]
anstyle = "1.0"
anstyle-lossy = "1.1"
anstyle-syntect = "1.0"
html-escape = "0.2"
linkify = "0.10"
pulldown-cmark = "0.13"
ratatui = { version = "0.28", default-features = false, features = ["crossterm"] }
supports-color = "3.0"
syntect = "5.3"
two-face = { version = "0.4", default-features = false, features = ["syntect-fancy"] }
textwrap = "0.16"
unicode-width = "0.2"
url = "2"
xai-grok-markdown-core = { path = "../xai-grok-markdown-core" }
