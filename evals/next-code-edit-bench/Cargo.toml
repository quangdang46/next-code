[package]
name = "next-code-edit-bench"
version = "0.1.0"
edition = "2024"
description = "Mutation-based edit benchmark harness for next-code"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
tree-sitter = "0.25"
tree-sitter-rust = "0.24"
rand = "0.8"
rand_chacha = "0.3"
similar = "2"
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3"
flate2 = "1"
tar = "0.4"
regex = "1"

[lib]
name = "next_code_edit_bench"
path = "src/lib.rs"

[[bin]]
name = "next-code-edit-bench"
path = "src/bin/next-code-edit-bench.rs"
