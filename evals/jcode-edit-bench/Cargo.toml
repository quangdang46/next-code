[package]
name = "jcode-edit-bench"
version = "0.1.0"
edition = "2024"
description = "Mutation-based edit benchmark harness for jcode"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
tree-sitter = "0.24"
tree-sitter-rust = "0.23"
similar = "2"
tempfile = "3"
regex = "1"
libc = { version = "0.2" }

[lib]
name = "jcode_edit_bench"
path = "src/lib.rs"

[[bin]]
name = "jcode-edit-bench"
path = "src/bin/jcode-edit-bench.rs"
