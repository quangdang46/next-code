[package]
name = "next-code-jbench"
version = "0.1.0"
edition = "2024"
description = "JBench — next-code's git-commit-reconstruction eval framework (scaffold)"

[lib]
name = "next_code_jbench"
path = "src/lib.rs"

[[bin]]
name = "jbench"
path = "src/bin/jbench.rs"

[dependencies]
next-code-agent-runtime = { path = "../../crates/next-code-agent-runtime" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "macros", "io-util", "process", "time", "sync"] }
futures = "0.3"
reqwest = { version = "0.12", features = ["json"] }
clap = { version = "4", features = ["derive", "env"] }

[features]
default = []
agent-runner = []

[dev-dependencies]
serde_json = "1"
tempfile = "3"
